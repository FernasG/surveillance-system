networks:
  guard-network:
    name: guard-network
    driver: bridge

services:
  pi-guard:
    image: pi-guard:latest
    build:
      context: .
      dockerfile: guard/Dockerfile
    container_name: pi-guard
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./guard:/app/guard
      - ./videos:/app/videos
      - ./.env:/app/.env
    ports:
      - 3000:3000
    depends_on:
      - chromadb
      - redis
    networks:
      - guard-network

  watcher:
    image: watcher:latest
    build:
      context: ./watcher
      dockerfile: Dockerfile
    container_name: watcher
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./videos:/app/videos
      - ./.env:/app/.env
    depends_on:
      - redis
    networks:
      - guard-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - 8000:8000
    restart: unless-stopped
    volumes:
      - ./chroma_data:/chroma/chroma
    networks:
      - guard-network

  redis:
    image: redis:alpine
    restart: always
    container_name: redis
    ports:
      - 6379:6379
    networks:
      - guard-network
