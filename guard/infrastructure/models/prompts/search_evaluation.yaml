description: "Evaluates the similarity between video frames and a user query."
version: "1.0"
template: |
  You are a video surveillance AI assistant. I have provided {num_frames} distinct sequential frames from a security camera feed.
  Carefully analyze ALL provided images and evaluate how well each one matches this user search query: '{user_query}'

  For each image, provide a confidence score from 0.0 to 1.0. Lower your score if the image is blurry, does not show a clear subject, or is otherwise irrelevant. 
  Respond strictly in this JSON format:
  [
    {{
      "index": 0,
      "confidence_score": 0.0
    }}
  ]